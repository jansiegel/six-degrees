name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm exec eslint . --max-warnings=0

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_BASE_PATH: /six-degrees

      - name: Assemble standalone bundle
        run: |
          mkdir -p deploy-bundle
          cp -r .next/standalone/. deploy-bundle/
          mkdir -p deploy-bundle/.next
          cp -r .next/static deploy-bundle/.next/static
          if [ -d public ]; then cp -r public deploy-bundle/public; fi

      - name: Deploy
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT || 22 }}
          SOURCE: 'deploy-bundle/'
          TARGET: ${{ secrets.DEPLOY_PATH }}
          ARGS: '-avz --delete'
          EXCLUDE: '/.env, /.env.local, /.env.production, /node_modules/, /backup/, /backups/, /.htaccess, /.well-known/, /ecosystem.config.js'
          SCRIPT_AFTER: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd ${{ secrets.DEPLOY_PATH }}
            PORT=3001 HOSTNAME=127.0.0.1 pm2 reload six-degrees --update-env \
              || PORT=3001 HOSTNAME=127.0.0.1 pm2 start server.js --name six-degrees --update-env
